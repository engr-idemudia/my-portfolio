<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04071d"/>
      <stop offset="100%" style="stop-color:#0c0e23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c3bff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Icon area -->
  <rect x="80" y="80" width="80" height="80" rx="16" fill="#6c3bff22" stroke="#6c3bff44" stroke-width="1.5"/>
  <text x="120" y="132" font-family="monospace" font-size="32" fill="#a855f7" text-anchor="middle">₿</text>
  <!-- Title -->
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff">NextBank</text>
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="28" fill="#8892b0">Fintech Banking Platform</text>
  <!-- Divider -->
  <rect x="80" y="330" width="120" height="3" rx="2" fill="url(#accent)"/>
  <!-- Description -->
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="22" fill="#ccd6f6">Real-time transactions · Multi-bank linking · Peer-to-peer transfers</text>
  <!-- Tech stack badges -->
  <rect x="80" y="430" width="140" height="44" rx="8" fill="#ffffff0d" stroke="#ffffff1a" stroke-width="1"/>
  <text x="150" y="458" font-family="Arial, sans-serif" font-size="18" fill="#a8b2d8" text-anchor="middle">Next.js 14</text>
  <rect x="236" y="430" width="140" height="44" rx="8" fill="#ffffff0d" stroke="#ffffff1a" stroke-width="1"/>
  <text x="306" y="458" font-family="Arial, sans-serif" font-size="18" fill="#a8b2d8" text-anchor="middle">TypeScript</text>
  <rect x="392" y="430" width="140" height="44" rx="8" fill="#ffffff0d" stroke="#ffffff1a" stroke-width="1"/>
  <text x="462" y="458" font-family="Arial, sans-serif" font-size="18" fill="#a8b2d8" text-anchor="middle">Appwrite</text>
  <rect x="548" y="430" width="140" height="44" rx="8" fill="#ffffff0d" stroke="#ffffff1a" stroke-width="1"/>
  <text x="618" y="458" font-family="Arial, sans-serif" font-size="18" fill="#a8b2d8" text-anchor="middle">Plaid API</text>
  <!-- Bottom label -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="18" fill="#6c3bff">idemudia.dev</text>
</svg>
